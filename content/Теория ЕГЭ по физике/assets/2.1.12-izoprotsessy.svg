<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="520" viewBox="0 0 1020 520" role="img" aria-labelledby="title desc">
  <title id="title">Графики изопроцессов</title>
  <desc id="desc">Три диаграммы показывают вид изотермы, изохоры и изобары на pV-, pT- и VT-координатах.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1020" height="520" fill="#f8fafc"/>
  <rect x="24" y="24" width="972" height="472" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="510" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Графики изопроцессов</text>
  <text x="510" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">сравнение на pV-, pT- и VT-диаграммах при неизменном числе молекул</text>

  <g font-family="Arial, sans-serif" font-size="15" fill="#334155">
    <g transform="translate(76 128)">
      <rect x="-18" y="-24" width="270" height="292" rx="10" fill="#f8fafc" stroke="#dbe4ef"/>
      <text x="117" y="0" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">pV-диаграмма</text>
      <line x1="44" y1="220" x2="224" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="44" y1="220" x2="44" y2="38" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="233" y="225" fill="#475569">V</text>
      <text x="36" y="30" fill="#475569">p</text>
      <path d="M68 70 C88 88, 100 118, 116 142 C135 172, 159 193, 205 205" fill="none" stroke="#2563eb" stroke-width="4"/>
      <line x1="126" y1="218" x2="126" y2="58" stroke="#16a34a" stroke-width="4"/>
      <line x1="46" y1="140" x2="213" y2="140" stroke="#dc2626" stroke-width="4"/>
      <text x="142" y="83" fill="#16a34a" font-weight="700">V = const</text>
      <text x="128" y="132" fill="#dc2626" font-weight="700">p = const</text>
      <text x="96" y="183" fill="#2563eb" font-weight="700">T = const</text>
    </g>

    <g transform="translate(376 128)">
      <rect x="-18" y="-24" width="270" height="292" rx="10" fill="#f8fafc" stroke="#dbe4ef"/>
      <text x="117" y="0" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">pT-диаграмма</text>
      <line x1="44" y1="220" x2="224" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="44" y1="220" x2="44" y2="38" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="233" y="225" fill="#475569">T</text>
      <text x="36" y="30" fill="#475569">p</text>
      <line x1="122" y1="218" x2="122" y2="58" stroke="#2563eb" stroke-width="4"/>
      <line x1="46" y1="146" x2="213" y2="146" stroke="#dc2626" stroke-width="4"/>
      <line x1="48" y1="216" x2="205" y2="64" stroke="#16a34a" stroke-width="4"/>
      <text x="131" y="80" fill="#2563eb" font-weight="700">T = const</text>
      <text x="132" y="138" fill="#dc2626" font-weight="700">p = const</text>
      <text x="82" y="106" fill="#16a34a" font-weight="700">V = const</text>
    </g>

    <g transform="translate(676 128)">
      <rect x="-18" y="-24" width="270" height="292" rx="10" fill="#f8fafc" stroke="#dbe4ef"/>
      <text x="117" y="0" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">VT-диаграмма</text>
      <line x1="44" y1="220" x2="224" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="44" y1="220" x2="44" y2="38" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="233" y="225" fill="#475569">T</text>
      <text x="36" y="30" fill="#475569">V</text>
      <line x1="126" y1="218" x2="126" y2="58" stroke="#2563eb" stroke-width="4"/>
      <line x1="46" y1="146" x2="213" y2="146" stroke="#16a34a" stroke-width="4"/>
      <line x1="48" y1="216" x2="205" y2="64" stroke="#dc2626" stroke-width="4"/>
      <text x="136" y="80" fill="#2563eb" font-weight="700">T = const</text>
      <text x="132" y="138" fill="#16a34a" font-weight="700">V = const</text>
      <text x="82" y="106" fill="#dc2626" font-weight="700">p = const</text>
    </g>

    <g transform="translate(266 438)">
      <line x1="0" y1="0" x2="36" y2="0" stroke="#2563eb" stroke-width="4"/>
      <text x="48" y="5">изотерма</text>
      <line x1="176" y1="0" x2="212" y2="0" stroke="#16a34a" stroke-width="4"/>
      <text x="224" y="5">изохора</text>
      <line x1="352" y1="0" x2="388" y2="0" stroke="#dc2626" stroke-width="4"/>
      <text x="400" y="5">изобара</text>
    </g>
